name: Pawfolio CI/CD

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pawfolio_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d pawfolio_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pawfolio_test
      SECRET_KEY: test-secret-key
      FLASK_ENV: testing

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Flake8
        run: flake8 .

      - name: Run Pytest
        run: pytest

      - name: Run Bandit Security Scan
        run: bandit -r . -c .bandit

      - name: Run Checkov Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          config_file: .checkov.yaml

      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 0

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: docker build -t pawfolio .

      - name: Tag Docker Images
        run: |
          docker tag pawfolio:latest ${{ secrets.ECR_REPOSITORY }}:latest
          docker tag pawfolio:latest ${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Push Docker Images
        run: |
          docker push ${{ secrets.ECR_REPOSITORY }}:latest
          docker push ${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}

      # ---------------- TEMPORARY DEBUG ----------------

      - name: Check SSH secret exists
        shell: bash
        run: |
          if [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then
            echo "❌ EC2_SSH_KEY is empty"
            exit 1
          fi
          echo "✅ EC2_SSH_KEY is present"

      - name: Validate SSH key
        shell: bash
        run: |
          printf "%s\n" "${{ secrets.EC2_SSH_KEY }}" > key.pem

          chmod 600 key.pem

          echo "===== File Information ====="
          ls -l key.pem
          wc -l key.pem

          echo "===== First Line ====="
          head -1 key.pem

          echo "===== Last Line ====="
          tail -1 key.pem

          echo "===== Validate Key ====="
          ssh-keygen -l -f key.pem

      # ---------------- END DEBUG ----------------

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            cd /opt/pawfolio

            echo "========================================"
            echo "Updating repository..."
            echo "========================================"

            git fetch origin main
            git checkout main
            git reset --hard origin/main

            echo "========================================"
            echo "Logging into Amazon ECR..."
            echo "========================================"

            ECR_REGISTRY=$(echo "${{ secrets.ECR_REPOSITORY }}" | cut -d'/' -f1)

            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
              | docker login \
                --username AWS \
                --password-stdin "$ECR_REGISTRY"

            echo "========================================"
            echo "Pulling latest Docker image..."
            echo "========================================"

            docker compose -f docker-compose.prod.yml pull

            echo "========================================"
            echo "Restarting containers..."
            echo "========================================"

            docker compose -f docker-compose.prod.yml up -d

            echo "========================================"
            echo "Waiting for application..."
            echo "========================================"

            sleep 15

            echo "========================================"
            echo "Running health check..."
            echo "========================================"

            curl --fail http://localhost/health

            echo "========================================"
            echo "Health check passed!"
            echo "========================================"

            echo "========================================"
            echo "Cleaning old Docker images..."
            echo "========================================"

            docker image prune -f

            echo "========================================"
            echo "Deployment completed successfully!"
            echo "========================================"
