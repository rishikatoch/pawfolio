{% extends "base.html" %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow border-0 rounded-4">

                <div class="card-body p-5">

                    <div class="text-center mb-4">

                        <h1 class="fw-bold">

                            💉 Add Vaccination

                        </h1>

                        <p class="text-muted">

                            Record a new vaccination for
                            <strong>{{ pet.name }}</strong>

                        </p>

                    </div>

                    <form method="POST">

                        <div class="mb-3">

                            <label class="form-label">

                                Vaccine Name

                            </label>

                            <input type="text" name="vaccine_name" class="form-control"
                                placeholder="Rabies / DHPP / Parvo" required>

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Date Given

                                </label>

                                <input type="date" name="date_given" class="form-control" required>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Next Due

                                </label>

                                <input type="date" name="next_due" class="form-control" required>

                            </div>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Veterinarian

                            </label>

                            <input type="text" name="veterinarian" class="form-control"
                                placeholder="Doctor / Clinic Name">

                        </div>

                        <div class="mb-4">

                            <label class="form-label">

                                Notes

                            </label>

                            <textarea name="notes" rows="4" class="form-control"
                                placeholder="Any observations..."></textarea>

                        </div>

                        <div class="d-grid gap-2">

                            <button type="submit" class="btn btn-success btn-lg">

                                💉 Save Vaccination

                            </button>

                            <a href="{{ url_for('pet_profile', id=pet.id) }}" class="btn btn-outline-secondary">

                                Cancel

                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
