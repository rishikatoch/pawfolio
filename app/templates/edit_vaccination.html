{% extends "base.html" %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow border-0 rounded-4">

                <div class="card-body p-5">

                    <div class="text-center mb-4">

                        <h1 class="fw-bold">
                            ✏ Edit Vaccination
                        </h1>

                        <p class="text-muted">
                            Update vaccination details.
                        </p>

                    </div>

                    {% if error %}
                    <div class="alert alert-danger">
                        {{ error }}
                    </div>
                    {% endif %}

                    <form method="POST">

                        <div class="mb-3">

                            <label class="form-label">
                                Vaccine Name
                            </label>

                            <input type="text" name="vaccine_name" class="form-control"
                                value="{{ vaccination.vaccine_name }}" required>

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Date Given
                                </label>

                                <input type="date" name="date_given" class="form-control"
                                    value="{{ vaccination.date_given or '' }}" required>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Next Due
                                </label>

                                <input type="date" name="next_due" class="form-control"
                                    value="{{ vaccination.next_due or '' }}" required>

                            </div>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Veterinarian
                            </label>

                            <input type="text" name="veterinarian" class="form-control"
                                value="{{ vaccination.veterinarian or '' }}">

                        </div>

                        <div class="mb-4">

                            <label class="form-label">
                                Notes
                            </label>

                            <textarea name="notes" rows="4"
                                class="form-control">{{ vaccination.notes or '' }}</textarea>

                        </div>

                        <div class="d-grid gap-2">

                            <button type="submit" class="btn btn-primary btn-lg">
                                💾 Update Vaccination
                            </button>

                            <a href="{{ url_for('pet_profile', pet_id=vaccination.pet_id) }}"
                                class="btn btn-outline-secondary">
                                Cancel
                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
