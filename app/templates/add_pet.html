<!DOCTYPE html>
<html>
<head>
    <title>Add Pet - Pawfolio</title>
</head>

<body>

<h1>Add a New Pet 🐾</h1>

<form method= "POST">

    <label>Pet Name:</label><br>
    <input type="text" name="pet_name"><br><br>

    <label>Breed:</label><br>
    <input type="text" name="pet_breed"><br><br>

    <label>Gender:</label><br>
    <select name="pet_gender">
        <option>Male</option>
        <option>Female</option>
    </select><br><br>

    <label>Age:</label><br>
    <input type="text" name="pet_age"><br><br>

    <label>Weight:</label><br>
    <input type="text" name="pet_weight"><br><br>

    <label>Vaccination Status:</label><br>
    <input type="text" name="pet_vaccination_status"><br><br>

    <button type="submit">Save Pet</button>

</form>

</body>
</html>
