{% extends "base.html" %}

{% block content %}

<div class="container py-5">

    <div class="text-center mb-5">
        <h1 class="display-4 fw-bold">
            🐾 Add a New Pet
        </h1>

        <p class="lead text-muted">
            Create your pet's digital profile and health record.
        </p>
    </div>

    <div class="glass-form">

        <form method="POST" enctype="multipart/form-data">

            <div class="row">

                <div class="col-md-5">

                    <div class="upload-card">

                        <img id="preview" src="" class="preview-image d-none">

                        <div id="placeholder">

                            <div class="upload-icon">
                              <i class="bi bi-cloud-arrow-up-fill upload-icon"></i>
                            </div>

                            <h5>Upload Pet Photo</h5>

                            <p class="text-muted">
                                JPG, PNG or JPEG
                            </p>

                        </div>

                        <input type="file" name="photo" id="photo" class="form-control mt-3"
                            onchange="previewImage(event)">

                    </div>

                </div>

                <div class="col-md-7">

                    <div class="row g-3">

                        <div class="col-md-6">
                          <label><i class="bi bi-heart-fill"></i> Pet Name</label>
                            <input type="text" name="name" class="form-control" required>
                        </div>

                        <div class="col-md-6">
                         <label><i class="bi bi-award"></i> Breed</label>
                            <input type="text" name="breed" class="form-control">
                        </div>

                        <div class="col-md-6">
                            <label><i class="bi bi-gender-ambiguous"></i> Gender</label>

                            <select name="gender" class="form-select">

                                <option>Male</option>
                                <option>Female</option>

                            </select>
                        </div>

                        <div class="col-md-6">
                          <label><i class="bi bi-calendar-heart"></i> Age</label>
                            <input type="text" name="age" class="form-control">
                        </div>

                        <div class="col-md-6">
                            <label><i class="bi bi-speedometer2"></i> Weight (kg)</label>
                            <input type="number" step="0.1" name="weight" class="form-control">
                        </div>

                        <div class="col-md-6">
                           <label><i class="bi bi-shield-check"></i> Vaccination Status</label>
                            <input type="text" name="vaccination_status" class="form-control">
                        </div>

                    </div>

                    <div class="mt-5">

                        <button class="btn btn-primary btn-lg">
                            💾 Save Pet
                        </button>

                        <a href="{{ url_for('home') }}" class="btn btn-outline-secondary btn-lg ms-2">

                            Cancel

                        </a>

                    </div>

                </div>

            </div>

        </form>

    </div>

</div>

<script>

    function previewImage(event) {

        const file = event.target.files[0];

        if (!file) return;

        const reader = new FileReader();

        reader.onload = function () {

            document.getElementById("preview").src = reader.result;

            document.getElementById("preview").classList.remove("d-none");

            document.getElementById("placeholder").style.display = "none";

        }

        reader.readAsDataURL(file);

    }

</script>

{% endblock %}
