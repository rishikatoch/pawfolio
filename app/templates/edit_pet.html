{% extends "base.html" %}

{% block content %}

<div class="container py-5">

    <div class="glass-form mx-auto" style="max-width:1100px;">

        <div class="text-center mb-5">

            <h1 class="display-5 fw-bold">
                ✏️ Edit Pet
            </h1>

            <p class="text-muted">
                Update your pet's profile and health information.
            </p>

        </div>

        <form method="POST" enctype="multipart/form-data">

            <div class="row">

                <!-- ================= LEFT ================= -->

                <div class="col-md-5">

                    <div class="upload-card text-center">

                        {% if pet.photo %}

                        <img id="preview" src="{{ url_for('static', filename='uploads/pets/' ~ pet.photo) }}"
                            class="preview-image mb-4" alt="{{ pet.name }}">

                        {% else %}

                        <img id="preview" src="{{ url_for('static', filename='images/default-pet.png') }}"
                            class="preview-image mb-4" alt="{{ pet.name }}">

                        {% endif %}

                        <h5 class="mb-3">
                            Change Photo
                        </h5>

                        <p class="text-muted">
                            JPG, JPEG, PNG, GIF or WEBP
                        </p>

                        <input type="file" name="photo" id="photo" class="form-control"
                            accept=".jpg,.jpeg,.png,.gif,.webp" onchange="previewImage(event)">

                    </div>

                </div>

                <!-- ================= RIGHT ================= -->

                <div class="col-md-7">

                    <div class="row g-3">

                        <!-- Name -->

                        <div class="col-md-6">

                            <label class="form-label">
                                Pet Name
                            </label>

                            <input type="text" name="name" class="form-control" value="{{ pet.name }}" required>

                        </div>

                        <!-- Breed -->

                        <div class="col-md-6">

                            <label class="form-label">
                                Breed
                            </label>

                            <input type="text" name="breed" class="form-control" value="{{ pet.breed }}" required>

                        </div>

                        <!-- Gender -->

                        <div class="col-md-6">

                            <label class="form-label">
                                Gender
                            </label>

                            <select name="gender" class="form-select" required>

                                <option value="Male" {% if pet.gender=="Male" %}selected{% endif %}>
                                    Male
                                </option>

                                <option value="Female" {% if pet.gender=="Female" %}selected{% endif %}>
                                    Female
                                </option>

                            </select>

                        </div>

                        <!-- Birth Date -->

                        <div class="col-md-6">

                            <label class="form-label">
                                Birth Date
                            </label>

                            <input type="date" name="birth_date" class="form-control"
                                value="{{ pet.birth_date.strftime('%Y-%m-%d') if pet.birth_date else '' }}"
                                max="{{ now.strftime('%Y-%m-%d') }}">

                        </div>

                        <!-- Weight -->

                        <div class="col-md-6">

                            <label class="form-label">
                                Weight (kg)
                            </label>

                            <input type="number" step="0.1" min="0" name="weight" class="form-control"
                                value="{{ pet.weight if pet.weight else '' }}">

                        </div>

                        <!-- Vaccination -->

                        <div class="col-md-6">

                            <label class="form-label">
                                Vaccination Status
                            </label>

                            <select name="vaccination_status" class="form-select" required>

                                <option value="Vaccinated" {% if pet.vaccination_status=="Vaccinated" %}selected{% endif
                                    %}>
                                    Vaccinated
                                </option>

                                <option value="Due Soon" {% if pet.vaccination_status=="Due Soon" %}selected{% endif %}>
                                    Due Soon
                                </option>

                                <option value="Not Vaccinated" {% if pet.vaccination_status=="Not Vaccinated"
                                    %}selected{% endif %}>
                                    Not Vaccinated
                                </option>

                            </select>

                        </div>

                    </div>

                    <div class="mt-5 d-flex gap-3">

                        <button class="btn btn-primary btn-lg flex-fill" type="submit">
                            💾 Save Changes
                        </button>

                        <a href="{{ url_for('pet_profile', pet_id=pet.id) }}" class="btn btn-outline-secondary btn-lg">
                            Cancel
                        </a>

                    </div>

                </div>

            </div>

        </form>

    </div>

</div>

<script>

    function previewImage(event) {

        const file = event.target.files[0];

        if (!file) {
            return;
        }

        const allowedTypes = [
            "image/jpeg",
            "image/png",
            "image/gif",
            "image/webp"
        ];

        if (!allowedTypes.includes(file.type)) {

            alert("Please select a valid image.");

            event.target.value = "";

            return;

        }

        const reader = new FileReader();

        reader.onload = function (e) {

            document.getElementById("preview").src = e.target.result;

        };

        reader.readAsDataURL(file);

    }

</script>

{% endblock %}
