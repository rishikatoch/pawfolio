{% extends "base.html" %}

{% block content %}

<div class="container py-5">

    <div class="glass-form mx-auto" style="max-width:1100px;">

        <div class="text-center mb-5">

            <h1 class="display-5 fw-bold">
                ✏ Edit Pet
            </h1>

            <p class="text-muted">
                Update your pet's profile and health information.
            </p>

        </div>

        <form method="POST" enctype="multipart/form-data">

            <div class="row">

                <!-- LEFT -->

                <div class="col-md-5">

                    <div class="upload-card text-center">

                        {% if pet.photo %}

                        <img src="{{ url_for('static', filename='uploads/' + pet.photo) }}" class="preview-image mb-4"
                            alt="{{ pet.name }}">

                        {% else %}

                        <div class="display-1 mb-4">
                            🐶
                        </div>

                        {% endif %}

                        <h5 class="mb-3">
                            Change Photo
                        </h5>

                        <input type="file" name="photo" class="form-control">

                    </div>

                </div>

                <!-- RIGHT -->

                <div class="col-md-7">

                    <div class="row g-3">

                        <div class="col-md-6">

                            <label class="form-label">
                                Pet Name
                            </label>

                            <input type="text" name="name" class="form-control" value="{{ pet.name }}" required>

                        </div>

                        <div class="col-md-6">

                            <label class="form-label">
                                Breed
                            </label>

                            <input type="text" name="breed" class="form-control" value="{{ pet.breed }}">

                        </div>

                        <div class="col-md-6">

                            <label class="form-label">
                                Gender
                            </label>

                            <select name="gender" class="form-select">

                                <option value="Male" {% if pet.gender=="Male" %}selected{% endif %}>
                                    Male
                                </option>

                                <option value="Female" {% if pet.gender=="Female" %}selected{% endif %}>
                                    Female
                                </option>

                            </select>

                        </div>

                        <div class="col-md-6">

                            <label class="form-label">
                                Age
                            </label>

                            <input type="text" name="age" class="form-control" value="{{ pet.age }}">

                        </div>

                        <div class="col-md-6">

                            <label class="form-label">
                                Weight (kg)
                            </label>

                            <input type="number" step="0.1" name="weight" class="form-control" value="{{ pet.weight }}">

                        </div>

                        <div class="col-md-6">

                            <label class="form-label">
                                Vaccination Status
                            </label>

                            <input type="text" name="vaccination_status" class="form-control"
                                value="{{ pet.vaccination_status }}">

                        </div>

                    </div>

                    <div class="mt-5 d-flex gap-3">

                        <button class="btn btn-primary btn-lg flex-fill">

                            💾 Save Changes

                        </button>

                        <a href="{{ url_for('pet_profile', id=pet.id) }}" class="btn btn-outline-secondary btn-lg">

                            Cancel

                        </a>

                    </div>

                </div>

            </div>

        </form>

    </div>

</div>

{% endblock %}
