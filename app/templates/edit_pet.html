<!DOCTYPE html>
<html>
<head>
    <title>Edit Pet - Pawfolio</title>
</head>

<body>

<h1>Edit Pet</h1>

<form method="POST">

    <label>Pet Name:</label><br>
    <input
        type="text"
        name="pet_name"
        value="{{ pet.name }}"
        required
    ><br><br>

    <label>Breed:</label><br>
    <input
        type="text"
        name="pet_breed"
        value="{{ pet.breed }}"
        required
    ><br><br>

    <label>Gender:</label><br>
    <select name="pet_gender" required>
        <option value="Male"
            {% if pet.gender == "Male" %}selected{% endif %}>
            Male
        </option>

        <option value="Female"
            {% if pet.gender == "Female" %}selected{% endif %}>
            Female
        </option>
    </select>
    <br><br>

    <label>Age:</label><br>
    <input
        type="text"
        name="pet_age"
        value="{{ pet.age }}"
        required
    ><br><br>

    <label>Weight (kg):</label><br>
    <input
        type="number"
        step="0.1"
        name="pet_weight"
        value="{{ pet.weight if pet.weight else '' }}"
        placeholder="Optional"
    ><br><br>

    <label>Vaccination Status:</label><br>
    <input
        type="text"
        name="pet_vaccination_status"
        value="{{ pet.vaccination_status }}"
        required
    ><br><br>

    <button type="submit">Update Pet</button>

    <a href="/">
        <button type="button">Cancel</button>
    </a>

</form>

</body>
</html>
