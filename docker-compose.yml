services:
  pawfolio:
    build: .
    container_name: pawfolio-app
    restart: unless-stopped

    ports:
      - "5000:5000"

    volumes:
      - .:/app

    env_file:
      - .env

    depends_on:
      - postgres

  postgres:
    image: postgres:16
    container_name: pawfolio-db
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: